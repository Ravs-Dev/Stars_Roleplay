<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JAMATRA PRIME</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { 
      background: linear-gradient(135deg, #0f172a, #1e293b, #7dd3fc, #ef4444);
      background-size: 400% 400%;
      animation: gradientMove 15s ease infinite;
    }
    @keyframes gradientMove {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }
  </style>
</head>

<body class="min-h-screen text-slate-100 font-sans">

<!-- Header -->
<header class="w-full shadow-sm bg-black/60 backdrop-blur sticky top-0 z-40">
  <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
    
    <!-- Logo -->
    <div class="flex items-center gap-3">
      <img src="profile.png" class="w-10 h-10 rounded-full">
      <div>
        <div class="text-lg font-semibold">JAMATRA PRIME</div>
        <div class="text-xs text-slate-400">Server & Community</div>
      </div>
    </div>

    <!-- Tombol garis tiga -->
    <button onclick="toggleMenu()" class="text-2xl">
      ☰
    </button>

  </div>
</header>

<!-- Sidebar menu -->
<div id="sidebar" class="fixed top-0 left-0 w-64 h-full bg-black/90 backdrop-blur p-6 transform -translate-x-full transition duration-300 z-50">

  <h2 class="text-xl font-bold mb-6">Menu</h2>

  <a href="index.html" class="block py-3 border-b border-slate-700">🏠 Beranda</a>
  <a href="topup.html" class="block py-3 border-b border-slate-700">💎 Top Up SA-MP</a>
  <a href="https://discord.gg/kXWScGdFXQ" class="block py-3">💬 Join Discord</a>

</div>

<!-- Overlay -->
<div id="overlay" onclick="toggleMenu()" class="fixed inset-0 bg-black/50 hidden z-40"></div>

<!-- Hero -->
<section class="py-20 text-center">
  <h1 class="text-4xl font-extrabold">Selamat datang di <span class="text-sky-300">JAMATRA PRIME</span></h1>
  <p class="mt-4 text-slate-200">Komunitas roleplay seru dan sistem top up server.</p>
</section>

<script>
function toggleMenu(){
  const sidebar = document.getElementById("sidebar");
  const overlay = document.getElementById("overlay");

  sidebar.classList.toggle("-translate-x-full");
  overlay.classList.toggle("hidden");
}
</script>

</body>
</html>
