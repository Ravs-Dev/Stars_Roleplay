<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Top Up SA-MP</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 text-white min-h-screen">

<header class="bg-black/70 p-4 flex justify-between items-center">
  <h1 class="text-xl font-bold">Top Up SA-MP</h1>
  <a href="index.html" class="text-sm bg-sky-500 px-3 py-1 rounded">Kembali</a>
</header>

<!-- Input Nama IC -->
<section class="p-4">
  <label class="text-sm text-slate-300">Masukkan Nama IC</label>
  <input id="namaIC" type="text" placeholder="Contoh: Kleren_McDeren"
    class="w-full mt-2 p-3 rounded-lg bg-slate-800 border border-slate-600">
</section>

<!-- Kategori -->
<section class="p-4 grid grid-cols-2 md:grid-cols-3 gap-4">

<button onclick="showKategori('karakter')" class="bg-blue-600 p-4 rounded-xl">
🧍 Karakter
</button>

<button onclick="showKategori('kendaraan')" class="bg-green-600 p-4 rounded-xl">
🚗 Kendaraan
</button>

<button onclick="showKategori('rumah')" class="bg-yellow-600 p-4 rounded-xl">
🏠 Rumah
</button>

<button onclick="showKategori('bisnis')" class="bg-purple-600 p-4 rounded-xl">
🏢 Bisnis
</button>

<button onclick="showKategori('workshop')" class="bg-red-600 p-4 rounded-xl">
🔧 Workshop
</button>

<button onclick="showKategori('garasi')" class="bg-cyan-600 p-4 rounded-xl">
🚘 Garasi
</button>

</section>

<!-- Produk -->
<section id="produk" class="p-4 grid grid-cols-2 md:grid-cols-3 gap-4"></section>

<script>
const waAdmin = "6281234567890"; // GANTI NOMOR ADMIN

const dataProduk = {
  karakter: [
    {nama: "Slot Karakter 2", harga: 20000},
    {nama: "Slot Karakter 3", harga: 35000},
    {nama: "Slot Karakter 4", harga: 50000}
  ],

  kendaraan: [
    {nama: "Sultan", harga: 80000},
    {nama: "Infernus", harga: 150000},
    {nama: "NRG-500", harga: 70000}
  ],

  rumah: [
    {nama: "Rumah Kecil", harga: 60000},
    {nama: "Rumah Sedang", harga: 120000},
    {nama: "Rumah Mewah", harga: 250000}
  ],

  bisnis: [
    {nama: "Warung", harga: 100000},
    {nama: "Bengkel", harga: 180000},
    {nama: "Restoran", harga: 300000}
  ],

  workshop: [
    {nama: "Workshop Basic", harga: 90000},
    {nama: "Workshop Pro", harga: 200000}
  ],

  garasi: [
    {nama: "Garasi 2 Slot", harga: 40000},
    {nama: "Garasi 5 Slot", harga: 90000}
  ]
};

function showKategori(kategori){
  const container = document.getElementById("produk");
  container.innerHTML = "";

  dataProduk[kategori].forEach(item => {
    container.innerHTML += `
      <div class="bg-white/10 p-4 rounded-xl text-center">
        <h3 class="font-semibold">${item.nama}</h3>
        <p class="text-sm mt-2">Rp ${item.harga.toLocaleString()}</p>
        <button 
          onclick="beli('${item.nama}', ${item.harga})"
          class="mt-3 bg-green-500 px-3 py-1 rounded">
          Beli
        </button>
      </div>
    `;
  });
}

function beli(nama, harga){
  const namaIC = document.getElementById("namaIC").value;

  if(!namaIC){
    alert("Masukkan nama IC dulu!");
    return;
  }

  const pesan = 
`Halo Admin, saya mau beli:

Nama IC: ${namaIC}
Item: ${nama}
Harga: Rp ${harga.toLocaleString()}

Mohon diproses.`;

  const url = `https://wa.me/${waAdmin}?text=${encodeURIComponent(pesan)}`;
  window.open(url, "_blank");
}
</script>

</body>
</html>
