<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Top Up SA-MP</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<style>
body {
  background: #020617;
  color: white;
  overflow-x: hidden;
}

/* Background partikel */
#particles-js {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: -1;
}

/* Teks glow biru */
.glow-text {
  color: #22d3ee;
  text-shadow: 0 0 10px #22d3ee, 0 0 20px #0ea5e9;
}
</style>
</head>

<body class="min-h-screen font-sans">

<!-- Partikel background -->
<div id="particles-js"></div>

<header class="bg-black/70 p-4 flex justify-between items-center border-b border-cyan-400">
  <h1 class="text-xl font-bold glow-text">DONATE SA-MP</h1>
  <a href="index.html" class="text-sm bg-sky-500 px-3 py-1 rounded">Kembali</a>

  
  <button onclick="toggleMenu()" class="text-2xl md:hidden glow">
      ☰
    </button>

  <!-- Menu desktop -->
      <nav class="space-x-4 hidden md:block">
        <a onclick="toggleMenu()" class="text-sm hover:text-sky-300 glow">☰</a>
        <a href="#about" class="text-sm hover:text-sky-300 glow">About</a>
        <a href="#projects" class="text-sm hover:text-sky-300 glow">My Project</a>
        <a href="#contact" class="text-sm hover:text-sky-300 glow">Contact</a>
      </nav>
    </div>
  </header>

  <div id="sidebar" class="fixed top-0 left-0 w-64 h-full bg-black/90 backdrop-blur p-6 transform -translate-x-full transition duration-300 z-50">
  <h2 class="text-xl font-bold mb-6 glow">Menu</h2>
  <a href="index.html" class="block py-3 border-b border-slate-700">🏠 Beranda</a>
  <a href="topup.html" class="block py-3 border-b border-slate-700">💎 Top Up SA-MP</a>
  <a href="https://discord.gg/QxqrFW6SAW" class="block py-3">💬 Join Discord</a>
</div>

<div id="overlay" onclick="toggleMenu()" class="fixed inset-0 bg-black/50 hidden z-40"></div>
</header>

<!-- Input Nama IC -->
<section class="p-4">
  <label class="text-sm text-slate-300 glow-text">Masukkan Nama IC</label>
  <input id="namaIC" type="text" placeholder="Contoh: Kleren_McDeren"
    class="w-full mt-2 p-3 rounded-lg bg-slate-800 border border-slate-600">
</section>

<!-- Kategori -->
<section class="p-4 grid grid-cols-2 md:grid-cols-3 gap-4">

<button onclick="showKategori('karakter')" class="bg-blue-600 p-4 rounded-xl">
🧍 Karakter
</button>

<button onclick="showKategori('kendaraan')" class="bg-green-600 p-4 rounded-xl">
🚗 Kendaraan
</button>

<button onclick="showKategori('rumah')" class="bg-yellow-600 p-4 rounded-xl">
🏠 Rumah
</button>

<button onclick="showKategori('bisnis')" class="bg-purple-600 p-4 rounded-xl">
🏢 Bisnis
</button>

<button onclick="showKategori('workshop')" class="bg-red-600 p-4 rounded-xl">
🔧 Workshop
</button>

<button onclick="showKategori('garasi')" class="bg-cyan-600 p-4 rounded-xl">
🚘 Garasi
</button>

</section>

<!-- Produk -->
<section id="produk" class="p-4 grid grid-cols-2 md:grid-cols-3 gap-4"></section>

<script>
const waAdmin = "6285123263221"; // GANTI NOMOR ADMIN

const dataProduk = {
  karakter: [
    {nama: "Slot Karakter 2", harga: 20000},
    {nama: "Slot Karakter 3", harga: 35000},
    {nama: "Slot Karakter 4", harga: 50000}
  ],

  kendaraan: [
    {nama: "Sultan", harga: 80000},
    {nama: "Infernus", harga: 150000},
    {nama: "NRG-500", harga: 70000}
  ],

  rumah: [
    {nama: "Rumah Kecil", harga: 60000},
    {nama: "Rumah Sedang", harga: 120000},
    {nama: "Rumah Mewah", harga: 250000}
  ],

  bisnis: [
    {nama: "Warung", harga: 100000},
    {nama: "Bengkel", harga: 180000},
    {nama: "Restoran", harga: 300000}
  ],

  workshop: [
    {nama: "Workshop Basic", harga: 90000},
    {nama: "Workshop Pro", harga: 200000}
  ],

  garasi: [
    {nama: "Garasi 2 Slot", harga: 40000},
    {nama: "Garasi 5 Slot", harga: 90000}
  ]
};

function showKategori(kategori){
  const container = document.getElementById("produk");
  container.innerHTML = "";

  dataProduk[kategori].forEach(item => {
    container.innerHTML += `
      <div class="bg-white/10 p-4 rounded-xl text-center border border-cyan-400">
        <h3 class="font-semibold glow-text">${item.nama}</h3>
        <p class="text-sm mt-2">Rp ${item.harga.toLocaleString()}</p>
        <button 
          onclick="beli('${item.nama}', ${item.harga})"
          class="mt-3 bg-green-500 px-3 py-1 rounded">
          Beli
        </button>
      </div>
    `;
  });
}

function beli(nama, harga){
  const namaIC = document.getElementById("namaIC").value;

  if(!namaIC){
    alert("Masukkan nama IC dulu!");
    return;
  }

  const pesan = 
`Halo Admin, saya mau beli:

Nama IC: ${namaIC}
Item: ${nama}
Harga: Rp ${harga.toLocaleString()}

Mohon diproses.`;

  const url = `https://wa.me/${waAdmin}?text=${encodeURIComponent(pesan)}`;
  window.open(url, "_blank");
}

/* Partikel background */
particlesJS("particles-js", {
  particles: {
    number: { value: 50 },
    size: { value: 3 },
    move: { speed: 1.5 },
    line_linked: {
      enable: true,
      distance: 150,
      color: "#22d3ee",
      opacity: 0.3
    },
    color: { value: "#22d3ee" }
  }
});
</script>

</body>
</html>
